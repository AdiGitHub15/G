<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gaurika's Magical Birthday 👑</title>

<style>
body {
  margin: 0;
  overflow-x: hidden;
  font-family: 'Segoe UI', cursive;
  background: radial-gradient(circle at top, #ffd6ec, #ff9acb, #ff6fa5);
  color: white;
  text-align: center;
}

.flower {
  position: absolute;
  font-size: 25px;
  animation: float 10s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  from { transform: translateY(100vh) rotate(0deg); }
  to { transform: translateY(-10vh) rotate(360deg); }
}

.card {
  position: relative;
  margin: 80px auto;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 0 40px rgba(255,255,255,0.4);
}

.crown {
  font-size: 60px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px gold; }
  to { text-shadow: 0 0 30px pink; }
}

h1 {
  font-size: 2.5em;
  margin: 10px 0;
}

.message {
  font-size: 1.2em;
  white-space: normal;
  opacity: 0;
  animation: fadeIn 3s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.hearts {
  font-size: 30px;
  margin-top: 20px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4fa3;
  font-weight: bold;
  cursor: pointer;
}

#surprise {
  display: none;
  margin-top: 20px;
  font-size: 1.3em;
  animation: fadeIn 2s forwards;
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const flowers = ["🌸","🌹","🌷","💮","🌺","🌼"];
for(let i=0;i<40;i++){
  let f = document.createElement("div");
  f.className = "flower";
  f.innerText = flowers[Math.floor(Math.random()*flowers.length)];
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (5 + Math.random()*5) + "s";
  document.body.appendChild(f);
}
</script>

<div class="card">
  <div class="crown">👑</div>

  <h1>Happy 17th Birthday,<br>Gaurika 💖</h1>

  <div class="message">
    You are my princess, my happiness, and my favorite person 💕
  </div>

  <div class="hearts">💖 💕 💗 💞</div>

  <button onclick="showSurprise()">Tap for Surprise 🎁</button>

  <div id="surprise">
    🌍 All flowers in the world are yours 💐<br><br>
    I love you more than words can say 💖✨
  </div>
</div>

<script>
function showSurprise(){
  const surprise = document.getElementById("surprise");
  surprise.style.display = "block";
  surprise.scrollIntoView({ behavior: "smooth" });

  // simple heart burst
  for(let i=0;i<15;i++){
    let heart = document.createElement("div");
    heart.innerText = "💖";
    heart.style.position = "fixed";
    heart.style.left = "50%";
    heart.style.top = "50%";
    heart.style.transform = "translate(-50%, -50%)";
    heart.style.transition = "all 1s ease-out";
    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.style.left = (50 + (Math.random()*40 - 20)) + "%";
      heart.style.top = (50 + (Math.random()*40 - 20)) + "%";
      heart.style.opacity = 0;
    },10);

    setTimeout(()=>heart.remove(),1000);
  }
}
</script>

</body>
</html>
